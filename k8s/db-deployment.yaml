apiVersion: apps/v1
kind: Deployment
metadata:
  name: purchasing-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: purchasing-db
  template:
    metadata:
      labels:
        app: purchasing-db
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpassword
        - name: MYSQL_DATABASE
          value: purchasing_db
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: purchasing-db
  ports:
  - port: 3306
    targetPort: 3306


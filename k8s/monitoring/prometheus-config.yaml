apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - "alert_rules.yml"
    scrape_configs:
      - job_name: 'purchasing-backend'
        static_configs:
          - targets: ['backend.default.svc.cluster.local:9090']
        metrics_path: '/actuator/prometheus'
  alert_rules.yml: |
    groups:
    - name: backend_alerts
      rules:
      - alert: BackendDown
        expr: up{job="purchasing-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend purchasing est DOWN"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090
  type: NodePort
